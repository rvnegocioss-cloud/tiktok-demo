<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Demo TikTok Login - RV Negócios</title>
</head>

<body style="font-family: Arial; text-align:center; margin-top:60px;">

  <h1>Demo TikTok Login</h1>

  <button onclick="login()" style="padding:12px 20px; font-size:16px;">
    Login com TikTok
  </button>

  <pre id="output" style="margin-top:30px;"></pre>

  <script>
    // 🔐 SEU CLIENT KEY DO TIKTOK
    const clientKey =
awt2w24zpg2i93y0 ;

    // 🌐 DOMÍNIO OFICIAL
    const redirectUri = "https://rvnegocioss.com.br/callback";

    const scope = "user.info.basic,video.upload,video.publish";

    function login() {
      const url =
        "https://www.tiktok.com/v2/auth/authorize/?" +
        "client_key=" + clientKey +
        "&response_type=code" +
        "&scope=" + scope +
        "&redirect_uri=" + encodeURIComponent(redirectUri);

      window.location.href = url;
    }

    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (code) {
      document.getElementById("output").innerHTML =
        "Login TikTok OK<br><br>Code:<br>" + code;
    }
  </script>

</body>
</html>
