<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Login TikTok - RV Negócios</title>
</head>

<body style="font-family: Arial; text-align:center; margin-top:60px;">

  <h1>Login com TikTok</h1>

  <button onclick="login()" style="padding:12px 20px; font-size:16px;">
    Login com TikTok
  </button>

  <pre id="output" style="margin-top:30px;"></pre>

  <script>
    // 🔐 COLOQUE SEU CLIENT KEY REAL AQUI
    const clientKey = "awt2w24zpg2i93y0";

    // 🌐 URL oficial do seu app
    const redirectUri = "https://rvnegocioss.com.br/callback";

    const scope = "user.info.basic,video.publish,video.upload";

    function login() {
      const url = new URL("https://www.tiktok.com/v2/auth/authorize/");

      url.searchParams.set("client_key", clientKey);
      url.searchParams.set("response_type", "code");
      url.searchParams.set("scope", scope);
      url.searchParams.set("redirect_uri", redirectUri);

      window.location.href = url.toString();
    }

    // 📩 captura retorno do TikTok
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (code) {
      document.getElementById("output").innerHTML =
        "✅ LOGIN OK<br><br>CODE:<br>" + code;
    }

    // ❌ erro de auth
    const error = params.get("error");

    if (error) {
      document.getElementById("output").innerHTML =
        "❌ ERRO LOGIN TIKTOK:<br>" + error;
    }
  </script>

</body>
</html>
